services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portcraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-portcraft}
    volumes:
      - pgdata_beta:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portcraft}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/shunsing22/port-craft/backend:${PORTCRAFT_VERSION:-beta}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portcraft}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-portcraft}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      PORTCRAFT_CHANNEL: beta
    volumes:
      - backups_beta:/app/backups

  frontend:
    image: ghcr.io/shunsing22/port-craft/frontend:${PORTCRAFT_VERSION:-beta}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro

volumes:
  pgdata_beta:
  backups_beta:
